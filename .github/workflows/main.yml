name: eksworkflow

on:
  push:
    branches: [main]

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-east-1
  EKS_CLUSTER_NAME: eks-app-cluster
  ECR_REPOSITORY: myapps/app

jobs:
  cicd_job:
    name: Build and deploy to EKS
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials with OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          role-session-name: github-actions-${{ github.run_id }}

      - name: Confirm AWS identity
        run: aws sts get-caller-identity

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push Docker image
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $REGISTRY/${{ env.ECR_REPOSITORY }}:$IMAGE_TAG .
          docker push $REGISTRY/${{ env.ECR_REPOSITORY }}:$IMAGE_TAG

      - name: Connect to EKS
        run: |
          aws eks update-kubeconfig \
            --region ${{ env.AWS_REGION }} \
            --name ${{ env.EKS_CLUSTER_NAME }}

      - name: Deploy Kubernetes manifests
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          kubectl apply -f k8s/storage_class.yaml
          kubectl apply -f k8s/db_sts.yaml

          kubectl rollout status statefulset/mongodb --timeout=10m

          kubectl apply -f k8s/app_deployment.yaml
          kubectl set image deployment/namegen-deployment namegen=$REGISTRY/${{ env.ECR_REPOSITORY }}:$IMAGE_TAG

          kubectl rollout status deployment/namegen-deployment --timeout=10m

      - name: Show Kubernetes resources
        run: |
          kubectl get pods -o wide
          kubectl get svc
          kubectl get pvc
